<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    
    <link rel = "stylesheet" href = "style.css">
    
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div class="mode-selection">
                <button class="mode-button active" id="human-btn" onclick="setGameMode('PvP')">Player vs Player</button>
                <button class="mode-button" id="computer-btn" onclick="setGameMode('PvC')">Player vs Computer</button>
        </div>

        <div class="board">
            <button class="box" id="cell-0" onclick="makeMove(0)"></button>
            <button class="box" id="cell-1" onclick="makeMove(1)"></button>
            <button class="box" id="cell-2" onclick="makeMove(2)"></button>
            <button class="box" id="cell-3" onclick="makeMove(3)"></button>
            <button class="box" id="cell-4" onclick="makeMove(4)"></button>
            <button class="box" id="cell-5" onclick="makeMove(5)"></button>
            <button class="box" id="cell-6" onclick="makeMove(6)"></button>
            <button class="box" id="cell-7" onclick="makeMove(7)"></button>
            <button class="box" id="cell-8" onclick="makeMove(8)"></button>
        </div>
        
        <div class="scoreboard">
            <div class="score">
                <span class="score-label">Player X</span>
                <span class="score-value" id="score-X">0</span>
            </div>
            <div class="score">
                <span class="score-label">Player O</span>
                <span class="score-value" id="score-O">0</span>
            </div>
            <div class="score">
                <span class="score-label">Ties</span>
                <span class="score-value" id="score-Tie">0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
